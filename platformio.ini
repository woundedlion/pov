; ============================================================================
; Teensy 4 CI gate — headless firmware build + size/layout measurement.
;
; This file is the PlatformIO half of docs/teensy_ci_gate_spec.md. It compiles
; the two Teensy 4.0 firmware images (Holosphere, Phantasm) on a stock Linux
; runner (or locally via `just teensy-size`) and a post-build hook
; (tools/teensy_gate_extra.py) enforces the per-region size budgets and
; memory-layout invariants in tools/teensy_budgets.json.
;
; COEXISTENCE WITH VMICRO: VMicro stays the edit/flash/debug tool and owns
; __vm/ + *.vcxproj; this gate owns .pio/ (gitignored). Neither rewrites the
; other's state, and both compile the *same* sources in place — no files move.
;
; ─── PHASE-0 SPIKE RESOLVED (2026-06) ───────────────────────────────────────
; Toolchain: teensy@5.0.0 natively delivers Teensyduino 1.59.0 + arm-gcc 11.3.1
; (branch 1, exact bench parity — see [env]). Two corrections the real build
; forced: (a) the Teensy core default -std=gnu++17 must be unflagged so the
; engine's C++20 compiles; (b) PlatformIO finds the sketch only via
; `$PROJECT_SRC_DIR/*.ino` and ignores build_src_filter, so a pre-script
; (tools/teensy_pre.py) repoints the sketch dir per env instead of a filter.
; ============================================================================

[platformio]
; Each env's sketch dir is selected per-env by tools/teensy_pre.py (PlatformIO's
; ino discovery globs $PROJECT_SRC_DIR/*.ino and ignores build_src_filter, so a
; repo-root src_dir + filter cannot place the .ino — Phase-0 finding). This
; default value is overridden there; it only needs to be a real dir. PlatformIO
; writes its build tree under .pio/ (gitignored).
src_dir = .
; Object cache, mirrors ci.yml's ccache (a [platformio]-section option, not
; [env]). Gitignored, CI-cached (§10). The WARNING ratchet must NOT share this
; cache — a cached TU emits no warnings — so the warning capture runs a separate
; cache-disabled build (§7.2, tools/teensy_warnings.py).
build_cache_dir = .pio/build_cache

[env]
; ── Toolchain (Phase-0 spike resolved 2026-06: branch 1, exact bench parity) ──
; teensy@5.0.0 natively delivers BOTH halves of the bench toolchain for Teensy 4:
;   framework-arduinoteensy      ~1.159.0    = Teensyduino 1.59.0 (the bench core)
;   toolchain-gccarmnoneeabi-teensy ~1.110301.0 = arm-none-eabi-gcc 11.3.1 (bench gcc)
; The Teensy 4 build uses PJRC's `-teensy` gcc FORK at 11.3.1 — the same compiler
; Teensyduino/VMicro install under Arduino15 — NOT the generic
; platformio/toolchain-gccarmnoneeabi (gcc 8.2.1) the platform.json also lists for
; older Teensy 3.x/LC boards. So no platform_packages override is needed: CI
; MIRRORS the bench compiler, not merely approximates it. Bump the pin deliberately.
platform = teensy@5.0.0
framework = arduino
board_build.f_cpu = 600000000L   ; 600 MHz (§4.1)

; Constrain the Library Dependency Finder so it does not wander the repo root
; (targets/wasm/, build*/). PHASE-0 must confirm this scope (§6).
lib_ldf_mode = chain

; pre  : select this env's sketch dir + add the shared core TUs (tools/teensy_pre.py).
; post : (1) demote vendored include dirs to -isystem so FastLED / Teensy-core
;        warnings stay out of the -Wall/-Wextra ratchet (tools/teensy_isystem.py);
;        (2) the size/layout gate — fails the build on any budget/layout
;        violation, using the calibrated budgets in tools/teensy_budgets.json.
extra_scripts =
    pre:tools/teensy_pre.py
    pre:tools/teensy_map.py
    post:tools/teensy_isystem.py
    post:tools/teensy_gate_extra.py

; Drop the Teensy core defaults our flags must override: its optimization (so the
; -O3 below wins) and its -std=gnu++17 (so -std=gnu++20 wins). The gnu++17 unflag
; is REQUIRED, confirmed by the Phase-0 build: without it memory.h's C++20
; `concept` fails ("'concept' only available with -std=c++20"). -Os/-O2 are
; harmlessly unflagged whether or not present (§4.1).
build_unflags = -Os -O2 -std=gnu++17

build_flags =
    -O3                       ; owner-confirmed "Fastest" (o3std), no LTO (§4.1)
    ; Float fast-math, matched to the WASM release build (CMakeLists.txt:71) so the
    ; device and simulator share the same float reassoc/FMA/reciprocal semantics.
    ; -fno-finite-math-only is REQUIRED after -ffast-math: -ffast-math implies
    ; -ffinite-math-only, which folds std::isfinite() to constant-true and lets the
    ; compiler assume no NaN/Inf. The render sink relies on real finite semantics
    ; (filter.h: a NaN coord must not silently UB-cast past the clip/wrap guards),
    ; so we keep finite checks live while taking the rest of fast-math. NOTE: float
    ; results are still NOT bit-identical to WASM (different ISA/libm/FMA
    ; contraction); the sim/device parity contract is the integer wrap guards, not
    ; floats. If this grows ITCM/FLASH past a budget (esp. Phantasm RAM1), the size
    ; gate (tools/teensy_gate.py) catches it.
    -ffast-math -fno-finite-math-only
    ; Include path. -I core / -I hardware resolve the `engine/effects.h`,
    ; `engine/effects_legacy.h`, `pov_single.h` includes in the .ino; the repo root
    ; (re-added by tools/teensy_pre.py, since the sketch dir is no longer the
    ; root) resolves the `core/...` / `effects/...` PATH-PREFIXED includes inside
    ; the headers. -I effects is kept for VMicro include-path parity (vcxproj
    ; IncludePath, §4.1) — the tree does not currently include any effect header
    ; by bare name, so it is parity, not a hard requirement.
    -I core
    -I effects
    -I hardware
    -D USB_SERIAL             ; USB type (§4.1)
    -D LAYOUT_US_ENGLISH      ; keyboard layout (§4.1)
    -std=gnu++20              ; match VMicro CppLanguageStandard (Teensy default is gnu++17)
    ; VMicro user C++ flags, copied verbatim so code size matches the bench (§4.1):
    -fno-exceptions -fno-rtti -fno-threadsafe-statics
    -fno-unwind-tables -fno-asynchronous-unwind-tables -fno-use-cxa-atexit
    ; VMicro warning suppressions — already-tolerated; keep them so the §7.2
    ; baseline isn't polluted by warnings the bench build never shows:
    -Wno-psabi -Wno-deprecated -Wno-attributes
    -Wall -Wextra             ; warning hygiene — baseline ratchet, not -Werror (§7.2)

lib_deps =
    ; Match the BENCH FastLED: Teensyduino 1.59.0 bundles FastLED 3.4.0
    ; (Arduino15/.../teensy/hardware/avr/1.59.0/libraries/FastLED). Newer FastLED
    ; (e.g. 3.10.x) moved CHSVPalette16/HUE_RED/CEveryNMillis and the CRGB/CHSV
    ; types into namespace fl, which the engine's device code predates — so parity
    ; with the bench version is required, not optional (§4.1).
    fastled/FastLED@3.4.0

; Project sources: the two shared core/engine/*.cpp TUs (the rest of core/ and all of
; hardware/ are header-only, reached via -I), PLUS each env's CONVERTED sketch
; (targets/<X>/<X>.ino.cpp, produced by PlatformIO from the .ino that
; tools/teensy_pre.py selects). Start from -<*> so a repo-root src_dir doesn't
; sweep in targets/wasm/, build*/, .pio/, etc.; per-env lines below add the sketch.
build_src_filter =
    -<*>
    +<core/engine/memory.cpp>
    +<core/engine/reaction_graph.cpp>

[env:holosphere]
board = teensy40
; Holosphere is committed at 288×144 (design res is 96×20 — the gate budgets the
; committed image, §5). FastLED/WS2801 output path (no USE_DMA_LEDS).
build_src_filter = ${env.build_src_filter} +<targets/Holosphere/Holosphere.ino.cpp>

[env:holosphere_dma]
board = teensy40
; Compile+link DRIFT CHECK for pov_single.h's single-board DMA path
; (USE_DMA_LEDS): no shipping image builds that branch (holosphere uses FastLED,
; phantasm uses POVSegmented), so it would otherwise rot untested against
; dma_led.h. Builds the Holosphere sketch with the DMA controller enabled. No
; size/layout gate — this proves the branch compiles + links, it is not a
; budgeted image — so extra_scripts drops post:teensy_gate_extra.py (dropping the
; gate also means no teensy_budgets.json entry is required).
build_flags = ${env.build_flags} -D USE_DMA_LEDS
extra_scripts =
    pre:tools/teensy_pre.py
    pre:tools/teensy_map.py
    post:tools/teensy_isystem.py
build_src_filter = ${env.build_src_filter} +<targets/Holosphere/Holosphere.ino.cpp>

[env:phantasm]
board = teensy40
board_build.ldscript = tools/phantasm.ld
; Phantasm selects the DMA HD107S path. This flag selects it for PlatformIO
; builds; the #ifndef-guarded #define USE_DMA_LEDS in Phantasm.ino covers
; Arduino-IDE/VMicro builds where this flag is absent. The guard keeps the two
; from colliding into a redefinition warning. Phantasm
; diverges from Holosphere in FLASH and RAM2/OCRAM (its DMALEDController eDMA TX
; buffers), so it carries its own ceilings in tools/teensy_budgets.json (§5, §8).
; SIZE RELIEF VALVE (docs/teensy_ci_gate_spec.md §4.1): Phantasm overflows RAM1
; under the bench's -O3 + full-newlib config, so this env DELIBERATELY diverges
; from that bench parity to shrink the image:
;   • -Os — the template engine (per-resolution <288,144> instantiations of
;     Scan/SDF/Plot/Mesh) pays enormously for -O3's inlining/unrolling; -Os cut
;     ITCM 363,792 -> 203,600 B (12 -> 7 of the 32 KB FlexRAM banks).
;   • newlib-nano (tools/teensy_nano.py) — smaller libc/libstdc++ + integer-only
;     printf; a further ITCM -14 KB (-> 189,216, 6 banks) and FLASH -3 KB.
; build_unflags strips the -O3 inherited from [env].build_flags so -Os wins.
; CONSEQUENCE: the phantasm gate no longer mirrors a -O3 VMicro image — the
; shipped firmware must adopt these same flags for the gate to predict its fit.
build_unflags = -O3 -O2 -std=gnu++17
build_flags = ${env.build_flags} -D USE_DMA_LEDS -Os
; Inherit the base scripts (PlatformIO does not merge list options across
; sections) and add the newlib-nano size pre-script (§4.1 size relief valve).
extra_scripts =
    ${env.extra_scripts}
    pre:tools/teensy_nano.py
build_src_filter = ${env.build_src_filter} +<targets/Phantasm/Phantasm.ino.cpp>

[env:profile]
board = teensy40
board_build.ldscript = tools/phantasm.ld
; On-device single-effect profiling image (targets/Profile/Profile.ino): the
; shipping Phantasm size/flag config (-Os, nano, DMA LEDs, N=4) plus the
; HS_PROFILE cycle counters. Select the effect per-run by appending
; -D HS_PROFILE_TARGET=<EffectClass> via PLATFORMIO_BUILD_FLAGS (the `just
; profile` recipe does this). Not a budgeted image, so the size gate is
; dropped like holosphere_dma.
build_unflags = -O3 -O2 -std=gnu++17
build_flags = ${env.build_flags} -D USE_DMA_LEDS -Os -D HS_PROFILE_ENABLE
extra_scripts =
    pre:tools/teensy_pre.py
    pre:tools/teensy_map.py
    post:tools/teensy_isystem.py
    pre:tools/teensy_nano.py
build_src_filter = ${env.build_src_filter} +<targets/Profile/Profile.ino.cpp>

[env:profile_o3]
board = teensy40
board_build.ldscript = tools/phantasm.ld
; -O3 twin of [env:profile]: identical config (nano, DMA LEDs, N=4, phantasm.ld,
; HS_PROFILE) EXCEPT the optimization level, so an -O3-vs-Os on-device A/B
; isolates the opt flag as the only variable. Only -Os is unflagged here, so the
; base [env]'s -O3 survives (vs [env:profile] which strips -O3 and forces -Os).
; A single-effect profile image (one effect's template instantiations, not the
; full phantasm playlist) fits FlexRAM at -O3 where the full phantasm image
; does not. Not a budgeted image, so the size gate is dropped.
build_unflags = -Os -O2 -std=gnu++17
build_flags = ${env.build_flags} -D USE_DMA_LEDS -D HS_PROFILE_ENABLE
extra_scripts =
    pre:tools/teensy_pre.py
    pre:tools/teensy_map.py
    post:tools/teensy_isystem.py
    pre:tools/teensy_nano.py
build_src_filter = ${env.build_src_filter} +<targets/Profile/Profile.ino.cpp>

[env:phantasm8]
board = teensy40
board_build.ldscript = tools/phantasm.ld
; Compile+link coverage for the optional eight-board firmware profile. The
; shipping N=4 image remains the budgeted `phantasm` environment; the N=8 rotor
; needs separate mechanical qualification before it receives release budgets.
build_unflags = -O3 -O2 -std=gnu++17
build_flags = ${env.build_flags} -D USE_DMA_LEDS -D PHANTASM_NUM_SEGMENTS=8 -Os
extra_scripts =
    pre:tools/teensy_pre.py
    pre:tools/teensy_map.py
    post:tools/teensy_isystem.py
    pre:tools/teensy_nano.py
build_src_filter = ${env.build_src_filter} +<targets/Phantasm/Phantasm.ino.cpp>
