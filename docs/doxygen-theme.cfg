# doxygen-awesome theme overrides, appended onto Doxyfile at docs-build time.
# Single source of truth for both .github/workflows/docs.yml (CI deploy) and the
# justfile `docs` recipe (local build) — kept out of the base Doxyfile because
# the .doxygen-awesome/ path only exists after the theme is fetched.
HTML_EXTRA_STYLESHEET = .doxygen-awesome/doxygen-awesome.css .doxygen-awesome/doxygen-awesome-sidebar-only.css docs/doxygen-custom.css
HTML_COLORSTYLE       = DARK
HTML_COLORSTYLE_GAMMA = 160
