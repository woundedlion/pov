# Presubmit CI — builds and runs the native unit suite, and compiles the WASM
# module, on every push and pull request. This is the cloud counterpart of the
# local .githooks/pre-commit gate (which is opt-out / on by default).
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Native unit tests (Clang)
    # Pinned image (not ubuntu-latest) so the apt clang version is deterministic
    # and the suite isn't silently re-hosted on a new runner image.
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang + Ninja + ccache
        run: |
          sudo apt-get update
          # Pin the compiler version (clang-18 is the default LLVM on Ubuntu
          # 24.04) so the native suite — including the __attribute__ /
          # __builtin_trap death-harness semantics — runs on a known compiler
          # rather than whatever the rolling 'clang' metapackage resolves to.
          sudo apt-get install -y clang-18 ninja-build ccache
          # cmake is preinstalled on GitHub runners (>= 3.21 required).

      # Persist the compile cache across runs. CMakeLists auto-detects ccache
      # and wires it as the compiler launcher, so unchanged TUs skip recompile.
      # A unique key per run + prefix restore-keys keeps the cache rolling.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-tests-${{ github.run_id }}
          restore-keys: ccache-tests-

      # Pass the versioned compiler explicitly so the build is reproducible; the
      # 'tests' toolchain respects a pre-set CMAKE_CXX_COMPILER and skips its
      # EMSDK/PATH auto-detection. Don't auto-touch git config in CI.
      - name: Configure
        run: >
          cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF
          -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18

      - name: Build
        run: cmake --build --preset tests

      - name: Test
        run: ctest --preset tests --output-on-failure

  wasm:
    name: WASM build (Emscripten)
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y ninja-build ccache

      # Pinned to match the local toolchain (emsdk 5.0.0). Bump deliberately.
      # actions-cache-folder persists the emsdk install across runs. This is the
      # one third-party action and it provisions the toolchain, so it is pinned
      # to a full commit SHA (not a mutable tag) to prevent a retagged v14 from
      # silently swapping the compiler.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 5.0.0
          actions-cache-folder: emsdk-cache-5.0.0

      # ccache also fronts emcc (CMAKE_CXX_COMPILER_LAUNCHER applies to both
      # modes), so cache it here too.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-wasm-${{ github.run_id }}
          restore-keys: ccache-wasm-

      - name: Configure + build WASM (compile check)
        run: |
          # Create a throwaway daydream checkout so the install() rules are active
          # (DAYDREAM_DIR is resolved at configure time and must already exist).
          # This lets the job exercise the provenance/install path below.
          mkdir -p "${{ runner.temp }}/daydream-install"
          cmake --preset wasm-release -DDAYDREAM_DIR="${{ runner.temp }}/daydream-install"
          cmake --build --preset wasm-release

      - name: Exercise install + provenance path
        # The daydream deploy gate consumes the provenance trio (.wasm, .sha,
        # .wasm.sha256) this install writes, but nothing previously verified the
        # install rules actually produce them. Run the install target and assert
        # the trio exists and the recorded hash verifies (the same sha256 check
        # the gate runs) so a broken provenance step fails here, not at deploy.
        run: |
          cmake --build --preset wasm-release-install
          dd="${{ runner.temp }}/daydream-install"
          for f in holosphere_wasm.wasm holosphere_wasm.sha holosphere_wasm.wasm.sha256; do
            if [ ! -f "$dd/$f" ]; then
              echo "::error::install did not produce $f — the deploy gate depends on it"
              exit 1
            fi
          done
          # A clean CI checkout must record a bare 40-hex SHA (no -dirty marker).
          if grep -q -- '-dirty' "$dd/holosphere_wasm.sha"; then
            echo "::error::engine .sha recorded as -dirty on a clean CI checkout"
            cat "$dd/holosphere_wasm.sha"
            exit 1
          fi
          ( cd "$dd" && sha256sum -c holosphere_wasm.wasm.sha256 )
          echo "Provenance trio produced and artifact hash verified."

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: holosphere_wasm
          path: |
            build/wasm-release/holosphere_wasm.js
            build/wasm-release/holosphere_wasm.wasm
          if-no-files-found: error
