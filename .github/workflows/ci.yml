# Presubmit CI — builds and runs the native unit suite, and compiles the WASM
# module, on every push and pull request. This is the cloud counterpart of the
# local .githooks/pre-commit gate (which is opt-out / on by default).
name: CI

on:
  # Restrict push to master: a push to a PR branch already fires the
  # pull_request event, and the two runs key on different refs
  # (refs/heads/* vs refs/pull/*/merge) so neither concurrency-cancels the
  # other. Limiting push avoids that double-run while still covering
  # direct-to-master pushes that open no PR.
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Native unit tests (Clang) / shard ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        # Shards partition all registered module tests plus the standalone
        # checks (color_luts provenance + its generator --check, fastmath_clamp
        # release-flag, h_offset_renorm device-offset, stack_budget,
        # arena_budget, and the module_roster / module_includes roster pins) so
        # every registered test runs in exactly one job.
        # SINGLE SOURCE OF TRUTH: the sanitizers job references this same anchored
        # list (*shard_matrix), and the shard-coverage job (which references the
        # per-shard anchors) asserts the union covers every registered test — so a
        # module added to CMake but to no shard fails CI instead of silently
        # running in zero Linux/sanitizer jobs. Adjust groupings here only.
        include: &shard_matrix
          - shard: 1
            test_regex: &shard1_re "^unit_(3dmath|concepts|memory|spatial|scb|sdf|conway|hankin|geometry|module_roster|module_includes)$"
          - shard: 2
            test_regex: &shard2_re "^unit_(mesh|solids|reaction_graph|color|color_luts|color_luts_check|palettes|easing_waves|platform|filter|plot_scan|fastmath_clamp)$"
          - shard: 3
            test_regex: &shard3_re "^unit_(canvas|scan|mesh_raster|transformers|noise|generators|animation|effects|h_offset_renorm|stack_budget|arena_budget)$"
          - shard: 4
            test_regex: &shard4_re "^unit_(dma_core|hd107s|dma_controller|led|pov_segmented|pov_single|pov_sync|param_marshal|wasm_predicates|util|presets|styles|shading|death)$"
    # Pinned image (not ubuntu-latest) so the apt clang version is deterministic
    # and the suite isn't silently re-hosted on a new runner image.
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Clang + Ninja + ccache
        run: |
          sudo apt-get update
          # Pin the compiler version (clang-18 is the default LLVM on Ubuntu
          # 24.04) so the native suite — including the __attribute__ /
          # __builtin_trap death-harness semantics — runs on a known compiler
          # rather than whatever the rolling 'clang' metapackage resolves to.
          sudo apt-get install -y clang-18 ninja-build ccache
          # cmake is preinstalled on GitHub runners (>= 3.29 required).

      # Each shard gets its own ccache slot so parallel saves don't collide.
      # The shard-agnostic restore-key means any prior shard's warm cache is
      # accepted on a cache miss (all shards compile the same TUs).
      - name: Cache ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-tests-${{ github.run_id }}-${{ matrix.shard }}
          restore-keys: ccache-tests-

      # Pass the versioned compiler explicitly so the build is reproducible; the
      # 'tests' toolchain respects a pre-set CMAKE_CXX_COMPILER and skips its
      # EMSDK/PATH auto-detection. Don't auto-touch git config in CI.
      - name: Configure
        run: >
          cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF
          -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18

      - name: Build
        run: cmake --build --preset tests

      # perf_bench is EXCLUDE_FROM_ALL (its wall-time run is too noisy to gate as
      # a ctest), so the default build never compiles it and an API rename can
      # ride green everywhere while silently breaking perf_bench.cpp. Compile it
      # here (build-only, once on shard 1) to keep it from bit-rotting.
      - name: Build perf_bench (compile coverage only)
        if: matrix.shard == 1
        run: cmake --build --preset tests --target perf_bench_Os perf_bench_O3

      # Reverse-direction roster guard (finding 596): every module in the
      # run_tests roster must map to a unit_<name> CTest registration, else it
      # runs in no ctest test and is silently uncovered. (The forward direction
      # already fails — an unknown argv module exits run_tests with status 2.)
      # Runs once, on shard 1, against the binary just built above.
      - name: Assert run_tests roster is registered in CTest
        if: matrix.shard == 1
        run: |
          roster=$(build/tests/tests/run_tests --list | sed -n 's/^  //p' | sort)
          registered=$(ctest --preset tests -N \
            | sed -n 's/.*[[:space:]]unit_\([A-Za-z0-9_]*\)$/\1/p' | sort)
          missing=$(comm -23 <(printf '%s\n' "$roster") <(printf '%s\n' "$registered"))
          if [ -n "$missing" ]; then
            echo "::error::run_tests modules with no CTest registration (add them to _hs_test_modules in tests/CMakeLists.txt): $missing"
            exit 1
          fi
          echo "All run_tests roster modules are registered in CTest."

      # Surface the cache hit rate so the ccache wiring above is verified to
      # actually fire, not just assumed. A run showing zero hits means the
      # compiler-launcher integration regressed and the cache is dead weight.
      - name: ccache stats
        if: always()
        run: ccache -sv

      - name: Test
        # Drive the deep smoke pass (default is 8 frames — fast for the local
        # pre-commit hook, but too short to reach the effect-lifecycle
        # transitions: RingShower slot reuse, Thrusters fire/FIFO expiry,
        # ShapeShifter's 48-frame cut). CI runs long enough to cover them so a
        # regression in the slot-recycling defect class fails here, not on-device.
        #
        # HS_EFFECTS_FULL=1 opts the effects module into its FULL tier: the
        # white-box correctness block and the 288x144 production-resolution roster
        # passes. The local pre-commit default is the QUICK tier (device-resolution
        # <96,20> passes only, ~2 s); CI is the authoritative gate for the
        # full-resolution paths (tests/test_effects.h effects_full_suite()).
        env:
          HS_SMOKE_FRAMES: 120
          HS_EFFECTS_FULL: 1
        run: ctest --preset tests --output-on-failure -R "${{ matrix.test_regex }}"

  sanitizers:
    name: Native unit tests (Clang, ASan + UBSan) / shard ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        # Same shard partition as the tests job — referenced by anchor, not
        # re-typed, so the two jobs cannot drift (finding 404).
        include: *shard_matrix
    # The native suite is the only build where the arena guards compile in
    # (device/WASM strip them), so ASan+UBSan here is the sole automated cover
    # for the arena-lifetime UB the death harness can't reach. -DHS_SANITIZE=ON
    # is wired in tests/CMakeLists.txt: ASan + UBSan with -fno-sanitize-recover,
    # so the first error is a hard failure. ccache absorbs the recompile cost.
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Clang + Ninja + ccache
        run: |
          sudo apt-get update
          # Same pinned clang-18 as the plain tests job (see its note).
          sudo apt-get install -y clang-18 ninja-build ccache

      # Separate cache prefix from the non-sanitized job (ASan/UBSan flags
      # change the compile command, so object caches must not collide).
      # Per-shard slot for the same reason as the tests job above.
      - name: Cache ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-sanitizers-${{ github.run_id }}-${{ matrix.shard }}
          restore-keys: ccache-sanitizers-

      - name: Configure
        run: >
          cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF -DHS_SANITIZE=ON
          -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18

      - name: Build
        run: cmake --build --preset tests

      - name: ccache stats
        if: always()
        run: ccache -sv

      - name: Test
        # Deep smoke pass (see the plain tests job) so the sanitized run reaches
        # the same effect-lifecycle transitions and exercises arena lifetimes.
        # HS_EFFECTS_FULL=1: run the effects module's full-resolution tier under
        # the sanitizers too (see the tests job note).
        env:
          HS_SMOKE_FRAMES: 120
          HS_EFFECTS_FULL: 1
        run: ctest --preset tests --output-on-failure -R "${{ matrix.test_regex }}"

  windows-tests:
    name: Native unit tests (Windows / Clang)
    # The native toolchain file's most intricate logic — the lld-link multicall
    # alias, CMAKE_LINKER_TYPE LLD, and the Windows SDK rc.exe discovery — only
    # runs on Windows and was previously exercised on no CI runner at all, on the
    # very platform the project is developed on. This job configures the tests
    # preset from a plain shell (no Visual Studio Developer Prompt), which is the
    # "no VS prompt required" promise the README makes.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # emsdk ships the Clang the toolchain prefers AND the lld.exe it aliases to
      # lld-link.exe — using it (rather than the runner's preinstalled LLVM)
      # exercises the alias-copy block, not just the linker-type/rc.exe paths.
      # Same pinned action + version as the wasm job.
      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 5.0.0
          actions-cache-folder: emsdk-cache-5.0.0

      # No explicit compiler: let the toolchain auto-locate emsdk's Clang and run
      # its full Windows branch (lld-link alias, rc.exe glob/NATURAL-sort).
      - name: Configure
        run: cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF

      - name: Build
        run: cmake --build --preset tests

      - name: Test
        # Deep smoke pass (see the Linux job): cover effect-lifecycle
        # transitions the default 8-frame local run never reaches.
        # HS_EFFECTS_FULL=1: run the effects module's full-resolution tier here
        # too (see the tests job note); this job runs the whole suite unsharded.
        env:
          HS_SMOKE_FRAMES: 120
          HS_EFFECTS_FULL: 1
        run: ctest --preset tests --output-on-failure

  wasm:
    name: WASM build (Emscripten)
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y ninja-build ccache

      # Pinned to match the local toolchain (emsdk 5.0.0). Bump deliberately.
      # actions-cache-folder persists the emsdk install across runs. This is the
      # one third-party action and it provisions the toolchain, so it is pinned
      # to a full commit SHA (not a mutable tag) to prevent a retagged v16 from
      # silently swapping the compiler.
      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 5.0.0
          actions-cache-folder: emsdk-cache-5.0.0

      # ccache also fronts emcc (CMAKE_CXX_COMPILER_LAUNCHER applies to both
      # modes), so cache it here too.
      - name: Cache ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-wasm-${{ github.run_id }}
          restore-keys: ccache-wasm-

      # Zero only the statistics counters (not the cached objects, so hits still
      # work) so the ccache-stats gate below measures THIS run's compilations,
      # not the cumulative counts restored from a prior run.
      - name: Zero ccache stats
        run: ccache -z

      - name: Configure + build WASM (compile check)
        run: |
          # Create a throwaway daydream checkout so the install() rules are active
          # (DAYDREAM_DIR is resolved at configure time and must already exist).
          # This lets the job exercise the provenance/install path below.
          mkdir -p "${{ runner.temp }}/daydream-install"
          cmake --preset wasm-release -DDAYDREAM_DIR="${{ runner.temp }}/daydream-install"
          cmake --build --preset wasm-release

      - name: Configure + build WASM debug (compile check)
        # The wasm-debug preset (Debug: 64 KB stack, -sASSERTIONS=1) ships no
        # runtime consumer, so without this it can bit-rot — an assertion or a
        # debug-only branch that stops compiling would ride a green release build.
        # Compile-only (no run); reuses the emsdk + ccache provisioned above.
        run: |
          cmake --preset wasm-debug -DDAYDREAM_DIR="${{ runner.temp }}/daydream-install"
          cmake --build --preset wasm-debug

      - name: Runtime-smoke WASM debug
        # The debug build carries -sASSERTIONS=1 and a distinct 64 KB stack;
        # instantiate and drive it so an assertion-guarded or debug-only
        # regression fails here instead of riding a green compile-only build.
        # -O0 disables inlining and stack-slot coalescing, so debug frames run
        # severalfold larger than the -O3 frames the default 2 KB stack-creep
        # tripwire is calibrated for; give the debug smoke its own fixed ceiling.
        env:
          WASM_SMOKE_STACK_CEILING: 4096
          # Reach the frame-48 ShapeShifter cut / arena compaction under
          # -sASSERTIONS=1; the 3-frame default never gets there.
          WASM_SMOKE_FRAMES: 120
        run: node scripts/wasm_smoke.mjs build/wasm-debug/holosphere_wasm.js

      # Verify ccache actually fronts em++ here (the comment above claims it
      # does via CMAKE_CXX_COMPILER_LAUNCHER). Stats were zeroed before the
      # builds, so a nonzero cacheable-call count (hits + misses) proves ccache
      # saw the em++ compilations this run; zero means the emcc launcher
      # integration silently disengaged and the cache is dead weight. Fail loudly
      # rather than leaving the documented check to eyeballing.
      - name: ccache stats
        if: always()
        run: |
          ccache -sv
          stat() { ccache --print-stats | awk -F'\t' -v k="$1" '$1==k{v=$2} END{print v+0}'; }
          calls=$(( $(stat direct_cache_hit) + $(stat preprocessed_cache_hit) + $(stat cache_miss) ))
          echo "Cacheable em++ calls this run: $calls"
          if [ "$calls" -eq 0 ]; then
            echo "::error::ccache recorded zero cacheable calls — the em++ launcher integration is not engaging."
            exit 1
          fi

      - name: Smoke-test the WASM module at runtime
        # The build above only proves the module compiles and links. Instantiate
        # it the way the browser does and drive the engine across every
        # registered effect at every enumerated resolution, so a SIMD-codegen fault, an
        # embind signature mismatch, an 8 KB stack overflow, or an
        # ALLOW_MEMORY_GROWTH detachment regression fails here instead of riding
        # a green build to deploy. (Node is preinstalled on the runner; the
        # script has no dependencies.) 120 frames so the shipped module reaches
        # late-lifecycle events (frame-48 ShapeShifter cut, arena compaction).
        env:
          WASM_SMOKE_FRAMES: 120
        run: node scripts/wasm_smoke.mjs build/wasm-release/holosphere_wasm.js

      - name: Exercise install + provenance path
        # The daydream deploy gate consumes the provenance trio (.wasm, .sha,
        # .wasm.sha256) this install writes, but nothing previously verified the
        # install rules actually produce them. Run the install target and assert
        # the trio exists and the recorded hash verifies (the same sha256 check
        # the gate runs) so a broken provenance step fails here, not at deploy.
        run: |
          cmake --build --preset wasm-release-install
          dd="${{ runner.temp }}/daydream-install"
          for f in holosphere_wasm.wasm holosphere_wasm.sha holosphere_wasm.wasm.sha256; do
            if [ ! -f "$dd/$f" ]; then
              echo "::error::install did not produce $f — the deploy gate depends on it"
              exit 1
            fi
          done
          # A clean CI checkout must record a bare 40-hex SHA (no -dirty marker).
          if grep -q -- '-dirty' "$dd/holosphere_wasm.sha"; then
            echo "::error::engine .sha recorded as -dirty on a clean CI checkout"
            cat "$dd/holosphere_wasm.sha"
            exit 1
          fi
          ( cd "$dd" && sha256sum -c holosphere_wasm.wasm.sha256 )
          echo "Provenance trio produced and artifact hash verified."

      - name: Upload WASM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: holosphere_wasm
          path: |
            build/wasm-release/holosphere_wasm.js
            build/wasm-release/holosphere_wasm.wasm
          if-no-files-found: error

  lut-provenance:
    name: Generated LUTs match committed header
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6        # pin the interpreter, like the teensy jobs
        with:
          python-version: '3.12'

      - name: Regenerate LUTs and diff numeric tokens
        # core/color/color_luts.h is generated by scripts/generate_luts.py (emitted to
        # stdout, then clang-formatted in the tree). Re-run the generator and
        # compare only the NUMERIC TOKENS in order: that is the LUT data that
        # matters, and it ignores the whitespace / row-wrapping that clang-format
        # applies, so the check fails only on a real numeric divergence. Catches a
        # script edit or a hand-edit of the header that drifts the tables — the
        # double-precision math makes silent drift plausible.
        run: |
          python3 scripts/generate_luts.py > /tmp/color_luts.generated.h
          if ! diff <(grep -oE '[0-9]+' /tmp/color_luts.generated.h) \
                    <(grep -oE '[0-9]+' core/color/color_luts.h); then
            echo "::error::core/color/color_luts.h is out of sync with scripts/generate_luts.py"
            echo "Regenerate with: python scripts/generate_luts.py > core/color/color_luts.h && clang-format -i core/color/color_luts.h"
            exit 1
          fi
          echo "LUT numeric tokens match the generator."

      - name: Generator self-test (monotonicity + sRGB round-trip)
        run: python3 scripts/generate_luts.py --check

  reaction-graph-provenance:
    name: Generated reaction-graph table matches committed file
    runs-on: ubuntu-24.04
    # The generator is O(RD_N*W) with W=1000 and runs ~2+ min; bound the job so a
    # pathological RD_N/W change can't hang a runner indefinitely.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6        # pin the interpreter, like the teensy jobs
        with:
          python-version: '3.12'

      - name: Regenerate reaction-graph table and diff numeric tokens
        # core/engine/reaction_graph.cpp is the 92 KB Fibonacci-lattice K-NN table,
        # emitted by scripts/generate_reaction_graph.py (pure Python, no deps).
        # Re-run the generator and compare only the NUMERIC TOKENS in order: that
        # is the neighbor-index data that matters, ignoring banner/whitespace. The
        # table reproduces bit-for-bit only in double precision, so silent drift
        # (a script edit, a hand-edit of the table, or a node()-formula change that
        # diverges from the generator) is plausible — this fails loudly on it.
        run: |
          python3 scripts/generate_reaction_graph.py > /tmp/reaction_graph.generated.cpp
          if ! diff <(grep -oE '[0-9]+' /tmp/reaction_graph.generated.cpp) \
                    <(grep -oE '[0-9]+' core/engine/reaction_graph.cpp); then
            echo "::error::core/engine/reaction_graph.cpp is out of sync with scripts/generate_reaction_graph.py"
            echo "Regenerate with: python scripts/generate_reaction_graph.py > core/engine/reaction_graph.cpp"
            exit 1
          fi
          echo "Reaction-graph numeric tokens match the generator."

  screenshot-gallery:
    name: Screenshot gallery is valid and covers every effect
    # The docs/screenshots gallery is installed into daydream and served live,
    # but a full headless re-capture per build is far too slow to gate on. This
    # job is the cheap freshness check instead: it (1) syntax-checks the capture
    # script so it can't silently break, and (2) asserts the committed PNG set
    # matches the HS_EFFECT_LIST roster exactly (every effect has a PNG, no
    # orphans) — catching roster drift like an added/renamed effect whose
    # screenshot was never captured. It cannot detect a visually-stale PNG; that
    # still relies on a manual `npm run screenshots` re-capture.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Node is preinstalled on the runner; the scripts have no runtime deps
      # (the freshness gate never launches a browser).
      - name: Syntax-check the capture script
        run: node --check scripts/capture_screenshots.mjs

      - name: Gallery covers every registered effect
        run: node scripts/check_screenshots.mjs

      # Cross-check the HS_EFFECT_LIST X-macro roster against the REGISTER_EFFECT
      # calls in effects/*.h. The WASM count check can't see an effect that is
      # never #included from core/engine/effects.h (absent from both registry and
      # count); scanning the headers on disk catches that roster drift.
      - name: Effect roster matches REGISTER_EFFECT registrations
        run: node scripts/check_effect_roster.mjs

  shard-coverage:
    name: Shard coverage (every test in exactly one shard)
    # Guards finding 404: the tests/sanitizers jobs run subsets of the suite via
    # the shard regexes. A module registered in CMake but absent from every shard
    # would run in no Linux/sanitizer job and silently lose that coverage. List
    # the registered tests and assert each matches exactly one shard regex — the
    # SAME anchored scalars the matrices use, so this check cannot drift from them.
    runs-on: ubuntu-24.04
    env:
      SHARD1: *shard1_re
      SHARD2: *shard2_re
      SHARD3: *shard3_re
      SHARD4: *shard4_re
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Clang + Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 ninja-build

      # Configure only — ctest -N reads the generated test list; no build needed.
      - name: Configure (register tests)
        run: >
          cmake --preset tests -DHS_INSTALL_GIT_HOOKS=OFF
          -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18

      - name: Assert every registered test is in exactly one shard
        run: |
          # ctest right-aligns the index, so single-digit tests get extra spaces
          # ("Test  #1:" vs "Test #10:"); match one-or-more spaces around it.
          mapfile -t TESTS < <(ctest --preset tests -N \
            | sed -n 's/^[[:space:]]*Test[[:space:]]\+#[0-9]\+:[[:space:]]*//p')
          if [ "${#TESTS[@]}" -eq 0 ]; then
            echo "::error::no tests parsed from 'ctest -N' — output format changed?"
            exit 1
          fi
          fail=0
          for t in "${TESTS[@]}"; do
            n=0
            for re in "$SHARD1" "$SHARD2" "$SHARD3" "$SHARD4"; do
              if printf '%s\n' "$t" | grep -Eq "$re"; then n=$((n + 1)); fi
            done
            if [ "$n" -ne 1 ]; then
              echo "::error::test '$t' is in $n shards (want exactly 1) — update the shard matrix in ci.yml"
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "All ${#TESTS[@]} registered tests are covered by exactly one shard."
          fi
          exit "$fail"

  teensy-gate-tests:
    name: Teensy gate parser + layout self-tests
    # The Teensy size/layout gate must gate itself: a check that can never fail
    # is worse than none. These host-Python tests prove every layout invariant
    # and region ceiling FAILS on a deliberately-broken fixture and PASSES on the
    # good one (docs/teensy_ci_gate_spec.md §9.1). No ARM toolchain, no
    # PlatformIO — fast, and independent of the heavy build job below, so it runs
    # on every push regardless of whether the firmware build is enabled yet.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Run gate parser/layout/warning self-tests
        run: python -m unittest discover -s tools/teensy_gate_tests -v

  teensy-size:
    name: Teensy 4 firmware (build + size + layout)
    # ─── ACTIVE GATE ───────────────────────────────────────────────────────────
    # Builds both Teensy 4.0 images headlessly and enforces the per-region budgets
    # + layout invariants (spec §10) via the post-build extra_script. Both images
    # now build GREEN and PASS end-to-end on the real ELF: HOLOSPHERE fits with
    # wide headroom and PHANTASM (all effects) fits RAM1 after the ITCM-bank
    # reclamation, the RNG/cos_theta DTCM trims, and the arena right-size (335 ->
    # 330 KiB) — free-for-locals ~13.6 KB over a measured 12 KiB floor. The former
    # TEENSY_GATE_ENABLED repo-variable guard is removed now that it goes green;
    # promoting this to a REQUIRED check in branch protection is the follow-up.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6        # PlatformIO is a Python package
        with:
          python-version: '3.12'
      - name: Cache PlatformIO toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.platformio
          # Target-agnostic (one toolchain serves all environments). The exact key
          # rotates on any platformio.ini pin bump; restore-keys then seeds the
          # restore from the newest prior toolchain cache so a pin bump pays only
          # for the changed packages, not a full multi-hundred-MB re-download
          # (mirrors the build-objects cache below). This can't mask a pin change:
          # `pio run` installs exactly the versions platformio.ini pins on top of
          # whatever the restore seeded, and the new exact key re-saves the result.
          key: pio-teensy-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-teensy-
      - name: Cache build objects               # mirrors ci.yml's ccache discipline
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          # build_cache_dir from platformio.ini — without this the 7,685-line
          # reaction_graph.cpp + FastLED recompile from scratch in every environment.
          path: .pio/build_cache
          # Rolling cache (like the toolchain cache above): the github.sha suffix
          # makes the exact key miss every run, so restore-keys seeds from the
          # newest prior cache and PlatformIO recompiles only what changed, then
          # this run saves a fresh entry. The per-commit save trades storage churn
          # for an always-warm incremental cache independent of branch topology.
          key: pio-objs-${{ hashFiles('platformio.ini') }}-${{ github.sha }}
          restore-keys: pio-objs-${{ hashFiles('platformio.ini') }}-
      - name: Install pinned PlatformIO
        run: pip install 'platformio==6.1.19'   # Phase-0 spike resolved this version
      - name: Build + size + layout gate (shipping targets + compile profiles)
        # The extra_script (tools/teensy_gate_extra.py) enforces per-env budgets
        # and sets a non-zero exit on any violation, emitting ::error:: annotations.
        # holosphere_dma is an ungated compile+link drift check for pov_single.h's
        # USE_DMA_LEDS path, which no shipping image builds (see platformio.ini).
        # phantasm8 likewise compiles the optional eight-board firmware profile;
        # the mechanically qualified N=4 image remains the budgeted target.
        run: pio run -e holosphere -e phantasm -e holosphere_dma -e phantasm8
      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: teensy-firmware
          path: .pio/build/*/firmware.*
          if-no-files-found: warn

  teensy-warnings:
    name: Teensy 4 firmware (first-party warning ratchet)
    # The warning ratchet (tools/teensy_warnings.py, spec §7.2) fails on any
    # first-party warning not in tools/teensy_warning_baseline.txt. It needs a
    # CACHE-DISABLED build: a cached/incremental TU emits no warnings, so the
    # object-cached teensy-size job above cannot feed it. This job is a separate,
    # clean build that does NOT restore the build-objects cache and disables the
    # object cache outright, so every first-party TU recompiles and emits its
    # warnings.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6        # PlatformIO is a Python package
        with:
          python-version: '3.12'
      # Toolchain cache is safe to share with teensy-size (it only holds the
      # downloaded compiler/framework, not built objects). The build-objects
      # cache is deliberately NOT restored here.
      - name: Cache PlatformIO toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.platformio
          key: pio-teensy-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-teensy-
      - name: Install pinned PlatformIO
        run: pip install 'platformio==6.1.19'   # same pin as teensy-size
      - name: Cache-disabled build + warning ratchet (all targets)
        # PLATFORMIO_BUILD_CACHE_DIR= overrides platformio.ini's build_cache_dir
        # with an empty value, disabling the object cache so no TU is skipped.
        # -v echoes the compiler invocations; warnings go to stderr, so 2>&1 folds
        # them into the captured log. pipefail (GitHub's default bash) makes a
        # build failure fail the step rather than masking it behind tee.
        run: |
          PLATFORMIO_BUILD_CACHE_DIR= pio run -e holosphere -e holosphere_dma -e phantasm -e phantasm8 -v 2>&1 \
            | tee teensy_build.log
          python tools/teensy_warnings.py --build-log teensy_build.log --github
