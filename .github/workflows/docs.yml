# Builds the Doxygen API reference and publishes it to GitHub Pages on every
# push to master. Pages serves the result at https://woundedlion.github.io/pov/.
# Independent of ci.yml: docs deploy on their own and do not gate the test
# matrix (nor does this wait on it). Doxygen config lives in /Doxyfile.
name: Docs

on:
  push:
    branches: [master]
    # Only the Doxygen inputs (Doxyfile INPUT = README.md core effects hardware
    # targets, *.h/*.cpp), the config, the custom stylesheet, and this workflow
    # affect the published site; skip the full rebuild+redeploy on other pushes.
    paths:
      - '**.h'
      - '**.cpp'
      - 'README.md'
      - 'Doxyfile'
      - 'docs/doxygen-custom.css'
      - '.github/workflows/docs.yml'
  # Build-only presubmit on PRs touching the same inputs: a fatal Doxygen parse
  # error fails the PR instead of publishing silently after merge. Non-fatal
  # warnings (a dropped README anchor, a missing @param) are NOT gated — Doxyfile
  # sets WARN_AS_ERROR = NO. The deploy job is push-gated, so PRs build without
  # deploying.
  pull_request:
    paths:
      - '**.h'
      - '**.cpp'
      - 'README.md'
      - 'Doxyfile'
      - 'docs/doxygen-custom.css'
      - '.github/workflows/docs.yml'

# Pages deployment needs write + OIDC; nothing else is granted.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Doxygen HTML
    # Pinned image (not ubuntu-latest) so the doxygen/graphviz versions are
    # deterministic, matching the rest of CI.
    runs-on: ubuntu-24.04
    # Bound the job so a stalled tarball download or a doxygen/graphviz hang
    # can't hold a runner to the 6h default.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Pin Doxygen to an exact release binary (apt's version trails and lacks
      # newer config tags this Doxyfile uses). Graphviz comes from the pinned
      # image. This matches the version used to validate the docs locally.
      - name: Install Doxygen 1.17.0 (pinned) + Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz
          curl -fsSL https://github.com/doxygen/doxygen/releases/download/Release_1_17_0/doxygen-1.17.0.linux.bin.tar.gz -o doxygen.tar.gz
          tar xzf doxygen.tar.gz
          echo "$PWD/doxygen-1.17.0/bin" >> "$GITHUB_PATH"

      # Modern theme (third-party). Pinned to an exact commit (v2.3.4) rather
      # than the mutable tag so a retagged release can't swap the theme CSS under
      # this write/OIDC-scoped deploy. Drop this step for stock Doxygen styling.
      - name: Apply doxygen-awesome theme
        run: |
          git init -q .doxygen-awesome
          git -C .doxygen-awesome remote add origin https://github.com/jothepro/doxygen-awesome-css.git
          git -C .doxygen-awesome fetch -q --depth 1 origin 568f56cde6ac78b6dfcc14acd380b2e745c301ea
          git -C .doxygen-awesome checkout -q FETCH_HEAD
          {
            echo "HTML_EXTRA_STYLESHEET = .doxygen-awesome/doxygen-awesome.css .doxygen-awesome/doxygen-awesome-sidebar-only.css docs/doxygen-custom.css"
            echo "HTML_COLORSTYLE       = DARK"
            echo "HTML_COLORSTYLE_GAMMA = 160"
          } >> Doxyfile

      - name: Generate docs
        run: mkdir -p build/docs && doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/docs/html

  deploy:
    name: Deploy to Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
